data:
    path:
        root: "data"
        raw: "data/Traffic_flow-HCM"
        preprocess: "data/preprocessed"
        graph: "data/preprocessed/graph.h5"
        dynamic: "data/preprocessed/dynamic.h5"
        static: "data/preprocessed/static.h5"
        result: "result"

    files:
        nodes.csv:
        segment_status.csv:
        streets.csv:
            fillNaN:
                fill_dict:
                    "max_velocity": -1
                    "name": "(khong ten)"
            ordinalEncodingStreetLvl:
                column: "level"

        segments.csv:
            fillNaN:
                fill_dict:
                    "max_velocity": -1
                    "street_name": "(khong ten)"
            rename:
                name_dict:
                    _id: "segment_id"
            z_scoreStandardization:
                columns: ["length"]
            oneHotEncoding:
                columns: ["street_type"]
            ordinalEncodingStreetLvl:
                column: "street_level"

        train.csv:
            weakFilter:
                threshold: 50
            periodExtraction: ~
            ordinalEncoding:
                map_dict:
                    A: 0
                    B: 1
                    C: 2
                    D: 3
                    E: 4
                    F: 5
            ordinalEncodingStreetLvl:
                column: "street_level"
            oneHotEncoding:
                columns: ["weekday", "street_type"]

    gen_graph:
        T: 24
        P: 12
        Q: 12

    split_ratio: [0.7, 0.2, 0.1]

train:
    STGNN:
        stgnn0:
            d: 16
            K: 4
            F: 1
            V: 669
            L: 1
            input_feature_idx: -1
            target_null_value: -1.0
            overall:
                batch_size: 32
                epoch: 1
                dropout: 0.5
            optimizer:
                name: "adam"
                params:
                    lr: 0.001
